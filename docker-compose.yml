# ============================================================
# SmartPredict AI Platform - Docker Compose (Développement)
# ============================================================
# Usage : docker-compose up -d
# Arrêt : docker-compose down
# Logs  : docker-compose logs -f [service]
# ============================================================

version: '3.8'

services:
  # =================== BASES DE DONNÉES ===================
  
  # PostgreSQL - Base de données principale
  postgres:
    image: postgres:16-alpine
    container_name: sp-postgres
    environment:
      POSTGRES_USER: smartpredict
      POSTGRES_PASSWORD: smartpredict_dev
      POSTGRES_DB: smartpredict_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartpredict"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sp-network

  # Redis - Cache et sessions
  redis:
    image: redis:7-alpine
    container_name: sp-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sp-network

  # =================== MESSAGE BROKER ===================
  
  # Zookeeper (requis par Kafka)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: sp-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - sp-network

  # Apache Kafka - Event Bus
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: sp-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - sp-network

  # =================== MICROSERVICES ===================
  
  # API Gateway - Point d'entrée unique
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: sp-gateway
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - AUTH_SERVICE_URL=http://auth:4001
      - USER_SERVICE_URL=http://user:4002
      - DATA_SERVICE_URL=http://data-ingestion:4003
      - PREDICTION_SERVICE_URL=http://prediction:4004
      - NLP_SERVICE_URL=http://nlp:4005
      - OCR_SERVICE_URL=http://ocr:4006
      - ANALYTICS_SERVICE_URL=http://analytics:4007
      - JWT_SECRET=smartpredict_jwt_secret_dev_2024
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    volumes:
      - ./gateway/src:/app/src
    networks:
      - sp-network

  # Auth Service - Authentification JWT
  auth:
    build:
      context: ./services/auth
      dockerfile: Dockerfile
    container_name: sp-auth
    ports:
      - "4001:4001"
    environment:
      - PORT=4001
      - DATABASE_URL=postgresql://smartpredict:smartpredict_dev@postgres:5432/smartpredict_db
      - JWT_SECRET=smartpredict_jwt_secret_dev_2024
      - JWT_EXPIRES_IN=24h
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./services/auth/src:/app/src
    networks:
      - sp-network

  # Frontend React
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sp-frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:4000/api
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    depends_on:
      - gateway
    networks:
      - sp-network

# =================== VOLUMES & NETWORKS ===================

volumes:
  postgres_data:
  redis_data:

networks:
  sp-network:
    driver: bridge